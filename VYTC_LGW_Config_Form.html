<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VYTC LGW Config Generator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f14;
    --surface: #111720;
    --surface2: #19212d;
    --border: #1e2d3d;
    --accent: #00d4ff;
    --accent2: #00ff9d;
    --warn: #ff6b35;
    --text: #c8d8e8;
    --text-dim: #5a7a94;
    --text-bright: #eaf4ff;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,212,255,0.012) 2px,
      rgba(0,212,255,0.012) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  header {
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, #0b0f14 0%, #0e1a25 100%);
    padding: 28px 40px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo-mark {
    width: 42px;
    height: 42px;
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    box-shadow: 0 0 16px rgba(0,212,255,0.25), inset 0 0 16px rgba(0,212,255,0.05);
    flex-shrink: 0;
  }

  header h1 {
    font-size: 18px;
    font-weight: 800;
    color: var(--text-bright);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  header p {
    font-size: 12px;
    color: var(--text-dim);
    font-family: var(--mono);
    margin-top: 2px;
    letter-spacing: 0.06em;
  }

  .status-pill {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    padding: 4px 10px;
    letter-spacing: 0.1em;
    animation: blink 2s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .container {
    display: grid;
    grid-template-columns: 340px 1fr;
    min-height: calc(100vh - 89px);
  }

  /* === FORM PANEL === */
  .form-panel {
    border-right: 1px solid var(--border);
    padding: 32px 28px;
    overflow-y: auto;
    background: var(--surface);
  }

  .section {
    margin-bottom: 32px;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .field {
    margin-bottom: 14px;
  }

  label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  input[type="text"], input[type="password"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 11px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  input[type="text"]:focus, input[type="password"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,212,255,0.1);
  }

  input[type="text"]::placeholder, input[type="password"]::placeholder {
    color: #2a3d4f;
    font-style: italic;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  /* Buttons */
  .btn-group {
    display: flex;
    gap: 10px;
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .btn {
    flex: 1;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
  }

  .btn-primary:hover {
    background: #33ddff;
    box-shadow: 0 0 20px rgba(0,212,255,0.4);
  }

  .btn-secondary {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    border-color: var(--text-dim);
    color: var(--text);
  }

  .btn-copy {
    background: var(--accent2);
    color: var(--bg);
    width: 100%;
    padding: 12px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    margin-top: 12px;
  }

  .btn-copy:hover {
    background: #33ffb3;
    box-shadow: 0 0 20px rgba(0,255,157,0.4);
  }

  .btn-download {
    background: transparent;
    color: var(--warn);
    border: 1px solid var(--warn);
    width: 100%;
    padding: 10px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 8px;
  }

  .btn-download:hover {
    background: rgba(255,107,53,0.1);
    box-shadow: 0 0 16px rgba(255,107,53,0.3);
  }

  /* === OUTPUT PANEL === */
  .output-panel {
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }

  .output-header {
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface2);
    flex-shrink: 0;
  }

  .output-header span {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-red { background: #ff5f57; }
  .dot-yellow { background: #ffbd2e; }
  .dot-green { background: #28c840; }

  #output {
    flex: 1;
    padding: 24px 28px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.75;
    color: #7ba3be;
    white-space: pre;
    overflow: auto;
    background: transparent;
  }

  /* Highlighted template fields */
  .template-field {
    color: var(--warn);
    background: rgba(255,107,53,0.1);
    padding: 0 2px;
    border: 1px solid rgba(255,107,53,0.3);
  }

  .filled-field {
    color: var(--accent2);
    background: rgba(0,255,157,0.07);
    padding: 0 2px;
  }

  /* Comment lines */
  .comment { color: #2e4d63; }
  .keyword { color: #6ab0d4; }
  .value { color: #a8cc8c; }
  .ip-addr { color: #e8c77b; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--accent2);
    color: var(--bg);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    padding: 12px 20px;
    letter-spacing: 0.08em;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 9999;
  }

  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* Unfilled warning */
  .unfilled-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--warn);
    margin-top: 8px;
    display: none;
  }

  .output-actions {
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    gap: 10px;
  }

  .output-actions .btn-copy, .output-actions .btn-download {
    width: auto;
    flex: 1;
    margin: 0;
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">LGW</div>
  <div>
    <h1>Webex Local Gateway Config</h1>
    <p>VYTC · CUCM + PSTN Integration · Template Generator</p>
  </div>
  <div class="status-pill">● READY</div>
</header>

<div class="container">

  <!-- FORM PANEL -->
  <div class="form-panel">

    <div class="section">
      <div class="section-label">Webex / Registration</div>

      <div class="field">
        <label>Registrar Domain</label>
        <input type="text" id="REGISTRAR_DOMAIN" placeholder="e.g. lgu1.amer.webex.com" oninput="generate()">
      </div>
      <div class="field">
        <label>Outbound Proxy Address</label>
        <input type="text" id="OUTBOUND_PROXY_ADDRESS" placeholder="e.g. sbc.amer.webex.com" oninput="generate()">
      </div>
      <div class="field">
        <label>Trunk Group OTG/DTG</label>
        <input type="text" id="TRUNK_GROUP_OTG_DTG" placeholder="e.g. TrunkGroup1" oninput="generate()">
      </div>
    </div>

    <div class="section">
      <div class="section-label">Credentials</div>

      <div class="field">
        <label>Line / Port Number</label>
        <input type="text" id="LINE_PORT" placeholder="e.g. WebexRouter12345678910_LGU" oninput="generate()">
      </div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="USERNAME" placeholder="e.g. WebexRouter10987654321_LGU" oninput="generate()">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="PASSWORD" placeholder="password" oninput="generate()">
      </div>
    </div>

    <div class="section">
      <div class="section-label">Network Interfaces</div>

      <div class="field">
        <label>Webex Interface</label>
        <input type="text" id="WEBEX_INTERFACE" placeholder="e.g. GigabitEthernet0/0/1" oninput="generate()">
      </div>
      <div class="field">
        <label>CUCM Interface</label>
        <input type="text" id="CUCM_INTERFACE" placeholder="e.g. GigabitEthernet0/0/0" oninput="generate()">
      </div>
      <div class="field">
        <label>PSTN Interface</label>
        <input type="text" id="PSTN_INTERFACE" placeholder="e.g. GigabitEthernet0/0/2" oninput="generate()">
      </div>
    </div>

    <div class="section">
      <div class="section-label">Server Addresses</div>

      <div class="field">
        <label>PSTN IP Address</label>
        <input type="text" id="PSTN_IP" placeholder="e.g. 203.0.113.10" oninput="generate()">
      </div>
      <div class="field-row">
        <div class="field">
          <label>CUCM Publisher IP</label>
          <input type="text" id="CUCM_PUB" placeholder="e.g. 10.0.1.10" oninput="generate()">
        </div>
        <div class="field">
          <label>CUCM Subscriber IP</label>
          <input type="text" id="CUCM_SUB" placeholder="e.g. 10.0.1.11" oninput="generate()">
        </div>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-secondary" onclick="clearAll()">Clear All</button>
      <button class="btn btn-primary" onclick="generate()">Generate Config</button>
    </div>

    <p class="unfilled-count" id="unfilledCount"></p>

  </div>

  <!-- OUTPUT PANEL -->
  <div class="output-panel">
    <div class="output-header">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
      <span style="margin-left:8px;">VYTC_LGW_Config.txt</span>
    </div>
    <div id="output"></div>
    <div class="output-actions">
      <button class="btn-copy" onclick="copyOutput()">⎘ Copy to Clipboard</button>
      <button class="btn-download" onclick="downloadOutput()">↓ Download .txt</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const TEMPLATE = `!<------Config Key Password------------>
key config-key password-encrypt <Client-ipt1!>
password encryption aes
!
!
!<------------Create Webex Trustpoint------------->
crypto pki trustpoint WebexCallingTP
revocation-check crl
!
!
!<------------Assign WebexCallingTP as default------------>
sip-ua
crypto signaling default trustpoint WebexCallingTP cn-san-validate server
transport tcp tls v1.2
tcp-retry 1000
!
!
!<------------Get Webex Cert Bundle------------------->
crypto pki trustpool import clean url http://www.cisco.com/security/pki/trs/ios_core.p7b
!
!
!<----Add Webex Calling IPs to trust list ------>
voice service voip
!<--Current list of all WxC IPs Updated 2024-06-17-->
 ip address trusted list
ipv4 23.89.0.0 255.255.0.0
ipv4 85.119.56.0 255.255.254.0
ipv4 128.177.14.0 255.255.255.0
ipv4 128.177.36.0 255.255.255.0
ipv4 135.84.168.0 255.255.248.0
ipv4 139.177.64.0 255.255.248.0
ipv4 139.177.72.0 255.255.254.0
ipv4 144.196.0.0 255.255.0.0
ipv4 150.253.128.0 255.255.128.0
ipv4 170.72.0.0 255.255.0.0
ipv4 170.133.128.0 255.255.192.0
ipv4 185.115.196.0 255.255.252.0
ipv4 199.19.196.0 255.255.254.0
ipv4 199.19.199.0 255.255.255.0
ipv4 199.59.64.0 255.255.248.0
!
!
allow-connections sip to sip
media statistics
media bulk-stats
no supplementary-service sip refer
no supplementary-service sip handle-replaces
fax protocol t38 version 0 ls-redundancy 0 hs-redundancy 0 fallback none
stun
 stun flowdata agent-id 1 boot-count 4
 !<-----Passoword ONLY used if FW opens STUN packets--->
 stun flowdata shared-secret 0 Password123$
sip
 g729 annexb-all
 early-offer forced
 asymmetric payload full
!
!
!!<--------Modify SIP Header for Webex Support--------->
voice class sip-profiles 200
 rule 9 request ANY sip-header SIP-Req-URI modify "sips:(.*)" "sip:\\1"
 rule 10 request ANY sip-header To modify "<sips:(.*)" "<sip:\\1"
 rule 11 request ANY sip-header From modify "<sips:(.*)" "<sip:\\1"
 rule 12 request ANY sip-header Contact modify "<sips:(.*)>" "<sip:\\1;transport=tls>" 
 rule 13 response ANY sip-header To modify "<sips:(.*)" "<sip:\\1"
 rule 14 response ANY sip-header From modify "<sips:(.*)" "<sip:\\1"
 rule 15 response ANY sip-header Contact modify "<sips:(.*)" "<sip:\\1"
 rule 20 request ANY sip-header From modify ">" ";otg={{TRUNK_GROUP_OTG_DTG}}>"
 rule 30 request ANY sip-header P-Asserted-Identity modify "sips:(.*)" "sip:\\1"
!
!
!<----- Prefer G711 for compatibility -------->
voice class codec 99
 codec preference 1 g711ulaw
 codec preference 2 g711alaw 
!
!
!<---------WxC only supports SHA1_80 for LGW SRTP----------->
voice class srtp-crypto 200
crypto 1 AES_CM_128_HMAC_SHA1_80
!
!
!<-------Use STUN to prevent no-way audio------------->
voice class stun-usage 200
 stun usage firewall-traversal flowdata
 stun usage ice lite
!
!
!<---Tenant Config for WxC Trunk Registration----->
voice class tenant 200
  registrar dns:{{REGISTRAR_DOMAIN}} scheme sips expires 240 refresh-ratio 50 tcp tls
  credentials number {{LINE_PORT}} username {{USERNAME}} password 0 {{PASSWORD}} realm BroadWorks
  authentication username {{USERNAME}} password 0 {{PASSWORD}} realm BroadWorks
  authentication username {{USERNAME}} password 0 {{PASSWORD}} realm {{REGISTRAR_DOMAIN}}
  no remote-party-id
  sip-server dns:{{REGISTRAR_DOMAIN}}
  connection-reuse
  srtp-crypto 200
  session transport tcp tls 
  url sips 
  error-passthru
  asserted-id pai 
  bind control source-interface {{WEBEX_INTERFACE}}
  bind media source-interface {{WEBEX_INTERFACE}}
  no pass-thru content custom-sdp 
  sip-profiles 200 
  outbound-proxy dns:{{OUTBOUND_PROXY_ADDRESS}}  
  privacy-policy passthru
!
!
!<---------------Tenant Config for OUTBOUND to UCM----------->
voice class tenant 100 
 session transport udp
 url sip
 error-passthru
 bind control source-interface {{CUCM_INTERFACE}}
 bind media source-interface {{CUCM_INTERFACE}}
 no pass-thru content custom-sdp
!
!
!<---------------Tenant Config for OUTBOUND to PSTN----------->
voice class tenant 150 
 session transport udp
 url sip
 error-passthru
 bind control source-interface {{PSTN_INTERFACE}}
 bind media source-interface {{PSTN_INTERFACE}}
 no pass-thru content custom-sdp
!
!
!<---Tenant Config for INBOUND PSTN Trunk ----->
voice class tenant 350 
bind control source-interface {{PSTN_INTERFACE}}
bind media source-interface {{PSTN_INTERFACE}}
no pass-thru content custom-sdp

!<---Tenant Config for INBOUND UCM Trunk ----->
voice class tenant 300 
bind control source-interface {{CUCM_INTERFACE}}
bind media source-interface {{CUCM_INTERFACE}}
no pass-thru content custom-sdp
!
!
!<------ITSP host IP-------->
voice class uri 100 sip
  host ipv4:{{PSTN_IP}}
!
!
!<-------Identify Tilson LGW instance based on OTG/DTG Parm------->
voice class uri 200 sip
 pattern dtg={{TRUNK_GROUP_OTG_DTG}}>
!
!
!<-------Identify UCM->WxC calls via singling port---->
voice class uri 300 sip
 pattern :5065
!
!
!<-------UCM Server group for WxC Calls---------->
voice class server-group 301
 ipv4 {{CUCM_PUB}} port 5065
 ipv4 {{CUCM_SUB}} port 5065
!
!
!<-------UCM Server group for PSTN Calls---------->
voice class server-group 305
 ipv4 {{CUCM_PUB}} port 5060
 ipv4 {{CUCM_SUB}} port 5060
!
!
!<----Outbound dial-peer toward IP PSTN----->
dial-peer voice 101 voip 
 description Outgoing dial-peer to IP PSTN
 destination-pattern BAD.BAD
 session protocol sipv2
 session target ipv4:{{PSTN_IP}}
 voice-class codec 99
 dtmf-relay rtp-nte
 voice-class sip tenant 100
 no vad
!
!
!<------------UCM->WxC DP----------->
dial-peer voice 200201 voip
 description Inbound/Outbound Webex Calling
 destination-pattern BAD.BAD
 session protocol sipv2
 session target sip-server
 voice-class codec 99
 dtmf-relay rtp-nte
 voice-class stun-usage 200
 no voice-class sip localhost
 voice-class sip tenant 200
 srtp
 no vad
!
!
!<---------OUTBOUND WxC->UCM DP------->
dial-peer voice 301 voip
 description OUTBOUND to UCM for WXC INBOUND
 destination-pattern BAD.BAD
 session protocol sipv2
 session server-group 301
 voice-class codec 99
 dtmf-relay rtp-nte
 voice-class sip tenant 100
 no vad
!
!
!<---------OUTBOUND PSTN-> UCM DP--------->
dial-peer voice 305 voip
 description OUTBOUND to UCM for PSTN INBOUND
 destination-pattern BAD.BAD
 session protocol sipv2
 session server-group 305
 voice-class codec 99 
 dtmf-relay rtp-nte
 voice-class sip tenant 100
 no vad
!
!
!!! UCM-->LGW-->WxC !!!
voice class dpg 200
 dial-peer 200201 preference 1
!
!
!!! WxC-->LGW-->UCM !!!
voice class dpg 300
dial-peer 301 preference 1
!
!
!!! UCM-->LGW-->PSTN !!!
voice class dpg 100
dial-peer 101 preference 1
!
!
!!! PSTN-->LGW-->UCM !!!
voice class dpg 302
dial-peer 305 preference 1
!
!
!<--------INBOUND DP for PSTN Trunk------>
dial-peer voice 100 voip
 description INBOUND from PSTN
 session protocol sipv2
 destination dpg 302
 incoming uri via 100
 voice-class codec 99
 dtmf-relay rtp-nte
 voice-class sip tenant 350
 no vad
!
!
!<---Apply DPG and URI to WxC DP---->
dial-peer voice 200201 voip
description Inbound/Outbound Webex Calling
max-conn 250
destination dpg 300
incoming uri request 200
!
!
!<---INBOUND from UCM->WxC---->
dial-peer voice 300 voip
description INBOUND from UCM for WxC
session protocol sipv2
destination dpg 200
incoming uri via 300
voice-class codec 99
dtmf-relay rtp-nte
voice-class sip tenant 300
no vad`;

const FIELDS = {
  REGISTRAR_DOMAIN: '',
  OUTBOUND_PROXY_ADDRESS: '',
  TRUNK_GROUP_OTG_DTG: '',
  LINE_PORT: '',
  USERNAME: '',
  PASSWORD: '',
  WEBEX_INTERFACE: '',
  CUCM_INTERFACE: '',
  PSTN_INTERFACE: '',
  PSTN_IP: '',
  CUCM_PUB: '',
  CUCM_SUB: '',
};

function getValues() {
  const vals = {};
  for (const key of Object.keys(FIELDS)) {
    vals[key] = document.getElementById(key)?.value?.trim() || '';
  }
  return vals;
}

function generate() {
  const vals = getValues();
  let result = TEMPLATE;

  for (const [key, val] of Object.entries(vals)) {
    if (val) {
      const re = new RegExp(`\\{\\{${key}\\}\\}`, 'g');
      result = result.replace(re, val);
    }
  }

  // Count remaining unfilled
  const remaining = (result.match(/\{\{[^}]+\}\}/g) || []);
  const uniq = [...new Set(remaining)];
  const countEl = document.getElementById('unfilledCount');
  if (uniq.length > 0) {
    countEl.style.display = 'block';
    countEl.textContent = `⚠ ${uniq.length} field(s) still unfilled`;
  } else {
    countEl.style.display = 'none';
  }

  renderOutput(result);
}

function renderOutput(text) {
  const container = document.getElementById('output');
  const lines = text.split('\n');
  let html = '';

  for (const line of lines) {
    if (line.trim().startsWith('!')) {
      // Comment line
      const escaped = escapeHtml(line);
      html += `<span class="comment">${escaped}</span>\n`;
    } else {
      // Highlight unfilled fields in orange, filled values in green
      let processed = escapeHtml(line);
      // Highlight remaining template tokens
      processed = processed.replace(/\{\{[^}]+\}\}/g, m =>
        `<span class="template-field">${m}</span>`
      );
      html += processed + '\n';
    }
  }

  container.innerHTML = html;
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function clearAll() {
  for (const key of Object.keys(FIELDS)) {
    const el = document.getElementById(key);
    if (el) el.value = '';
  }
  generate();
}

function getRawOutput() {
  const vals = getValues();
  let result = TEMPLATE;
  for (const [key, val] of Object.entries(vals)) {
    if (val) {
      const re = new RegExp(`\\{\\{${key}\\}\\}`, 'g');
      result = result.replace(re, val);
    }
  }
  return result;
}

function copyOutput() {
  navigator.clipboard.writeText(getRawOutput()).then(() => {
    showToast('Copied to clipboard!');
  });
}

function downloadOutput() {
  const text = getRawOutput();
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'VYTC_LGW_Config.txt';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Downloading config...');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

// Initialize
generate();
</script>
</body>
</html>
